# Full stack: PostgreSQL, Redis, API, nginx + static client.
# Run from repository root:
#   docker compose -f deployment/docker-compose/docker-compose.yml --env-file deployment/docker-compose/.env up -d --build
#
# Or from this directory with paths adjusted (see README).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-expense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-expense}
      POSTGRES_DB: ${POSTGRES_DB:-expense_tracker}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-expense} -d ${POSTGRES_DB:-expense_tracker}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data

  api:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile.api
    environment:
      PORT: "4000"
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-expense}:${POSTGRES_PASSWORD:-expense}@postgres:5432/${POSTGRES_DB:-expense_tracker}
      REDIS_URL: redis://redis:6379
      CLIENT_ORIGIN: ${CLIENT_ORIGIN}
      JWT_SECRET: ${JWT_SECRET}
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID:-}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET:-}
      OAUTH_GITHUB_CLIENT_ID: ${OAUTH_GITHUB_CLIENT_ID:-}
      OAUTH_GITHUB_CLIENT_SECRET: ${OAUTH_GITHUB_CLIENT_SECRET:-}
      OAUTH_GITLAB_CLIENT_ID: ${OAUTH_GITLAB_CLIENT_ID:-}
      OAUTH_GITLAB_CLIENT_SECRET: ${OAUTH_GITLAB_CLIENT_SECRET:-}
      OAUTH_GITLAB_BASE_URL: ${OAUTH_GITLAB_BASE_URL:-}
      OAUTH_MICROSOFT_CLIENT_ID: ${OAUTH_MICROSOFT_CLIENT_ID:-}
      OAUTH_MICROSOFT_CLIENT_SECRET: ${OAUTH_MICROSOFT_CLIENT_SECRET:-}
      OAUTH_MICROSOFT_TENANT: ${OAUTH_MICROSOFT_TENANT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    expose:
      - "4000"
    volumes:
      - api_uploads:/app/uploads

  web:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile.web
    ports:
      - "${HTTP_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
  api_uploads:
