apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: expense-tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          # Build and push to your registry, or load into kind/minikube:
          #   docker build -f deployment/docker/Dockerfile.api -t expense-tracker-api:latest .
          image: expense-tracker-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: NODE_ENV
              value: production
          envFrom:
            - secretRef:
                name: expense-api-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: expense-tracker
spec:
  ports:
    - port: 4000
      targetPort: 4000
  selector:
    app: api
