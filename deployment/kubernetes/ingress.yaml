# Requires an Ingress controller (nginx-ingress, Traefik, cloud LB, etc.).
# Replace host and TLS secret name for your cluster.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: expense-tracker
  namespace: expense-tracker
  annotations:
    # Example for nginx-ingress; adjust for your controller.
    # nginx.ingress.kubernetes.io/proxy-body-size: "25m"
spec:
  ingressClassName: nginx
  rules:
    - host: expense.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
  tls:
    - hosts:
        - expense.example.com
      secretName: expense-tls
