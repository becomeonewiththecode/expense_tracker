apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: expense-tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          # Build and push to your registry, or load locally:
          #   docker build -f deployment/docker/Dockerfile.web -t expense-tracker-web:latest .
          image: expense-tracker-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: expense-tracker
spec:
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: web
