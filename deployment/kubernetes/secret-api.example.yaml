# Example only — copy to secret-api.yaml (do not commit real values), edit, then apply.
# Or create the secret with kubectl (see README).
#
# kubectl apply -f secret-api.yaml
#
# DATABASE_URL must match postgres-secret credentials and the postgres Service hostname.

apiVersion: v1
kind: Secret
metadata:
  name: expense-api-secrets
  namespace: expense-tracker
type: Opaque
stringData:
  DATABASE_URL: postgresql://expense:change-this-password-before-apply@postgres:5432/expense_tracker
  REDIS_URL: redis://redis:6379
  CLIENT_ORIGIN: https://expense.example.com
  JWT_SECRET: replace-with-openssl-rand-base64-32
  OAUTH_GOOGLE_CLIENT_ID: ""
  OAUTH_GOOGLE_CLIENT_SECRET: ""
  OAUTH_GITHUB_CLIENT_ID: ""
  OAUTH_GITHUB_CLIENT_SECRET: ""
  OAUTH_GITLAB_CLIENT_ID: ""
  OAUTH_GITLAB_CLIENT_SECRET: ""
  OAUTH_GITLAB_BASE_URL: ""
  OAUTH_MICROSOFT_CLIENT_ID: ""
  OAUTH_MICROSOFT_CLIENT_SECRET: ""
  OAUTH_MICROSOFT_TENANT: ""
