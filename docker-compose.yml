services:
  postgres:
    container_name: expense-tracker-dev-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: expense
      POSTGRES_PASSWORD: expense
      POSTGRES_DB: expense_tracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    container_name: expense-tracker-dev-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
